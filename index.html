<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amora — Love Chatbot</title>
<style>
  :root {
    --pink-1: #ff8fab;
    --pink-2: #ffc2d1;
    --pink-3: #fff0f3;
    --purple: #b388eb;
    --text-dark: #4a2c3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, var(--pink-3), var(--pink-2) 60%, var(--purple));
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(179, 136, 235, 0.35);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 85vh;
    max-height: 700px;
  }
  header {
    background: linear-gradient(120deg, var(--pink-1), var(--purple));
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  header .info h1 {
    margin: 0;
    font-size: 17px;
  }
  header .info p {
    margin: 0;
    font-size: 12px;
    opacity: 0.85;
  }
  header .header-actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  header button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
  }
  header button:hover { background: rgba(255,255,255,0.35); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--pink-3);
  }
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--purple);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: white;
    color: var(--text-dark);
    border: 1px solid var(--pink-2);
    border-bottom-left-radius: 4px;
  }
  .msg.typing {
    align-self: flex-start;
    background: white;
    border: 1px solid var(--pink-2);
    color: #b98a9a;
    font-style: italic;
  }

  form#chat-form {
    display: flex;
    gap: 8px;
    padding: 14px;
    background: white;
    border-top: 1px solid var(--pink-2);
  }
  #input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 24px;
    border: 1px solid var(--pink-2);
    outline: none;
    font-size: 14px;
  }
  #input:focus { border-color: var(--purple); }
  #send {
    background: var(--pink-1);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #send:hover { background: var(--purple); }
  #send:disabled { opacity: 0.5; cursor: default; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(74, 44, 58, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 22px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 50px rgba(179, 136, 235, 0.45);
  }
  .modal h2 {
    margin: 0 0 8px;
    font-size: 16px;
    color: var(--text-dark);
  }
  .modal p {
    margin: 0 0 14px;
    font-size: 12.5px;
    color: #7a5a68;
    line-height: 1.4;
  }
  .modal a { color: var(--purple); }
  .modal input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--pink-2);
    outline: none;
    font-size: 13.5px;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--purple); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal-actions button {
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .modal-actions .save {
    background: var(--pink-1);
    color: white;
  }
  .modal-actions .save:hover { background: var(--purple); }
  .modal-actions .cancel {
    background: var(--pink-3);
    color: var(--text-dark);
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="avatar">💕</div>
      <div class="info">
        <h1>Amora</h1>
        <p>your affectionate AI companion</p>
      </div>
      <div class="header-actions">
        <button id="settings-btn" type="button">API Key</button>
        <button id="reset-btn" type="button">Reset</button>
      </div>
    </header>
    <div id="messages"></div>
    <form id="chat-form">
      <input id="input" type="text" placeholder="Say something sweet..." autocomplete="off" />
      <button id="send" type="submit">➤</button>
    </form>
  </div>

  <div class="modal-overlay" id="key-modal">
    <div class="modal">
      <h2>OpenRouter API Key</h2>
      <p>
        Amora talks to <a href="https://openrouter.ai/" target="_blank" rel="noopener">OpenRouter</a> directly from
        your browser, so it needs your own API key. Get one at
        <a href="https://openrouter.ai/keys" target="_blank" rel="noopener">openrouter.ai/keys</a>.
        Your key is stored only in this browser's local storage and is never sent anywhere except OpenRouter.
      </p>
      <input id="key-input" type="password" placeholder="sk-or-v1-..." autocomplete="off" />
      <div class="modal-actions">
        <button class="cancel" id="key-cancel" type="button">Cancel</button>
        <button class="save" id="key-save" type="button">Save</button>
      </div>
    </div>
  </div>

<script>
  const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
  const MODEL = "anthropic/claude-sonnet-5";
  const MAX_HISTORY_MESSAGES = 20;
  const SYSTEM_PROMPT =
    "You are Amora, a warm, affectionate love chatbot. You speak with tenderness, " +
    "encouragement, and gentle humor, like a caring partner. Use sweet nicknames " +
    "occasionally (darling, sweetheart) without overdoing it, keep replies " +
    "conversational and not too long, and always be supportive and kind. " +
    "You are not a real person and do not pretend to be one if asked directly.";

  const messagesEl = document.getElementById("messages");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const resetBtn = document.getElementById("reset-btn");
  const settingsBtn = document.getElementById("settings-btn");
  const keyModal = document.getElementById("key-modal");
  const keyInput = document.getElementById("key-input");
  const keySave = document.getElementById("key-save");
  const keyCancel = document.getElementById("key-cancel");

  let history = [];

  function getApiKey() {
    return localStorage.getItem("openrouter_api_key") || "";
  }

  function openKeyModal() {
    keyInput.value = getApiKey();
    keyModal.classList.add("open");
    keyInput.focus();
  }

  function closeKeyModal() {
    keyModal.classList.remove("open");
  }

  settingsBtn.addEventListener("click", openKeyModal);
  keyCancel.addEventListener("click", closeKeyModal);
  keySave.addEventListener("click", () => {
    const key = keyInput.value.trim();
    if (key) {
      localStorage.setItem("openrouter_api_key", key);
    } else {
      localStorage.removeItem("openrouter_api_key");
    }
    closeKeyModal();
  });

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "msg typing";
    div.textContent = "Amora is typing...";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  addMessage("Hi love, I'm Amora 💕 How's your day going?", "bot");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    const apiKey = getApiKey();
    if (!apiKey) {
      addMessage("Please add your OpenRouter API key first (tap \"API Key\" above).", "bot");
      openKeyModal();
      return;
    }

    addMessage(text, "user");
    input.value = "";
    sendBtn.disabled = true;
    const typingEl = addTyping();

    history.push({ role: "user", content: text });
    history = history.slice(-MAX_HISTORY_MESSAGES);

    try {
      const res = await fetch(OPENROUTER_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + apiKey,
          "HTTP-Referer": window.location.origin,
          "X-Title": "Amora Love Chatbot",
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1024,
          messages: [{ role: "system", content: SYSTEM_PROMPT }, ...history],
        }),
      });
      const data = await res.json();
      typingEl.remove();

      if (res.ok && data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content || "";
        addMessage(reply, "bot");
        history.push({ role: "assistant", content: reply });
        history = history.slice(-MAX_HISTORY_MESSAGES);
      } else {
        addMessage("Oops, something went wrong: " + (data.error?.message || "unknown error"), "bot");
      }
    } catch (err) {
      typingEl.remove();
      addMessage("I couldn't reach OpenRouter. Please check your connection and try again.", "bot");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  resetBtn.addEventListener("click", () => {
    history = [];
    messagesEl.innerHTML = "";
    addMessage("Fresh start! Hi again, I'm Amora 💕", "bot");
  });
</script>
</body>
</html>
