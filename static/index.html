<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amora — Love Chatbot</title>
<style>
  :root {
    --pink-1: #ff8fab;
    --pink-2: #ffc2d1;
    --pink-3: #fff0f3;
    --purple: #b388eb;
    --text-dark: #4a2c3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, var(--pink-3), var(--pink-2) 60%, var(--purple));
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(179, 136, 235, 0.35);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 85vh;
    max-height: 700px;
  }
  header {
    background: linear-gradient(120deg, var(--pink-1), var(--purple));
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  header .info h1 {
    margin: 0;
    font-size: 17px;
  }
  header .info p {
    margin: 0;
    font-size: 12px;
    opacity: 0.85;
  }
  header button {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
  }
  header button:hover { background: rgba(255,255,255,0.35); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--pink-3);
  }
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--purple);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: white;
    color: var(--text-dark);
    border: 1px solid var(--pink-2);
    border-bottom-left-radius: 4px;
  }
  .msg.typing {
    align-self: flex-start;
    background: white;
    border: 1px solid var(--pink-2);
    color: #b98a9a;
    font-style: italic;
  }

  form#chat-form {
    display: flex;
    gap: 8px;
    padding: 14px;
    background: white;
    border-top: 1px solid var(--pink-2);
  }
  #input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 24px;
    border: 1px solid var(--pink-2);
    outline: none;
    font-size: 14px;
  }
  #input:focus { border-color: var(--purple); }
  #send {
    background: var(--pink-1);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #send:hover { background: var(--purple); }
  #send:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="avatar">💕</div>
      <div class="info">
        <h1>Amora</h1>
        <p>your affectionate AI companion</p>
      </div>
      <button id="reset-btn" type="button">Reset</button>
    </header>
    <div id="messages"></div>
    <form id="chat-form">
      <input id="input" type="text" placeholder="Say something sweet..." autocomplete="off" />
      <button id="send" type="submit">➤</button>
    </form>
  </div>

<script>
  const messagesEl = document.getElementById("messages");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const resetBtn = document.getElementById("reset-btn");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "msg typing";
    div.textContent = "Amora is typing...";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  addMessage("Hi love, I'm Amora 💕 How's your day going?", "bot");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";
    sendBtn.disabled = true;
    const typingEl = addTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      typingEl.remove();
      if (res.ok) {
        addMessage(data.reply, "bot");
      } else {
        addMessage("Oops, something went wrong: " + (data.error || "unknown error"), "bot");
      }
    } catch (err) {
      typingEl.remove();
      addMessage("I couldn't reach the server. Please try again.", "bot");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  resetBtn.addEventListener("click", async () => {
    await fetch("/api/reset", { method: "POST" });
    messagesEl.innerHTML = "";
    addMessage("Fresh start! Hi again, I'm Amora 💕", "bot");
  });
</script>
</body>
</html>
